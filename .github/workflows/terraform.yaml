name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - 'modules/**'
      - '.github/workflows/terraform.yaml'
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'modules/**'
      - '.github/workflows/terraform.yaml'

# Non-sensitive Terraform variables passed via TF_VAR_* env vars.
# Sensitive values come from GitHub Secrets in each step that needs them.
env:
  TF_VAR_ghcr_username:    gabrielmcryu
  TF_VAR_container_image:  ghcr.io/gabrielmcryu/django-app:latest
  TF_VAR_location:         eastus2

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
      TF_VAR_django_secret_key: ${{ secrets.TF_VAR_DJANGO_SECRET_KEY }}
      TF_VAR_ghcr_token:        ${{ secrets.TF_VAR_GHCR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set ARM_* env vars from Service Principal JSON
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS_TF }}
        run: |
          CLIENT_SECRET=$(jq -r '.clientSecret' <<< "$AZURE_CREDS")
          echo "::add-mask::$CLIENT_SECRET"
          {
            echo "ARM_CLIENT_ID=$(jq -r '.clientId' <<< "$AZURE_CREDS")"
            echo "ARM_CLIENT_SECRET=$CLIENT_SECRET"
            echo "ARM_TENANT_ID=$(jq -r '.tenantId' <<< "$AZURE_CREDS")"
            echo "ARM_SUBSCRIPTION_ID=$(jq -r '.subscriptionId' <<< "$AZURE_CREDS")"
          } >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform fmt
        id: fmt
        continue-on-error: true
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
